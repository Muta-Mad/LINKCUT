version: '3.3'
volumes:
  pg_data:
services:
  db:
    image: postgres:13
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file: .env
  backend:
    build: .
    env_file: .env
    ports:
      - '8000:8000'
    depends_on:
      - db
    command: >
      sh -c "sleep 5 &&
             alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    restart: on-failure